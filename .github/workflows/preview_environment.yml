name: Preview Environment

on:
  pull_request:
    types: [opened, reopened, closed]
    branches-ignore:
      - main

permissions:
  pull-requests: write

env:
  RAILWAY_API_URL: https://backboard.railway.com/graphql/v2
  VERCEL_API_URL: https://api.vercel.com

jobs:
  setup-preview:
    if: |
      (github.event.action == 'opened' || github.event.action == 'reopened')
      && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway PR environment
        id: railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          echo "Waiting for Railway PR environment (PR #$PR_NUMBER, branch: $BRANCH)..."

          railway_gql() {
            local query="$1"
            local variables="$2"
            local payload
            payload=$(jq -n --arg q "$query" --argjson v "$variables" '{query: $q, variables: $v}')
            curl -s -o /tmp/railway_response.json -w "%{http_code}" -X POST "$RAILWAY_API_URL" \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload"
          }

          # Step 1: Wait for the PR environment to exist and have a successful deployment
          ENV_ID=""
          for i in $(seq 1 90); do
            HTTP_CODE=$(railway_gql \
              'query($projectId: String!) { project(id: $projectId) { environments { edges { node { id name deployments(first: 1) { edges { node { status } } } } } } } }' \
              "{\"projectId\": \"$RAILWAY_PROJECT_ID\"}")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Railway API returned HTTP $HTTP_CODE (attempt $i)"
              cat /tmp/railway_response.json 2>/dev/null || true
              sleep 10
              continue
            fi
            RESPONSE=$(cat /tmp/railway_response.json)

            # Show available environment names on first attempt
            if [ "$i" -eq 1 ]; then
              echo "Available environments: $(echo "$RESPONSE" | jq -r '[.data.project.environments.edges[]? | .node.name] | join(", ")')"
            fi

            # Extract environment matching this PR (name ends with -$PR_NUMBER)
            ENV_NODE=$(echo "$RESPONSE" | jq --arg pr "$PR_NUMBER" '
              [.data.project.environments.edges[]?
              | select(.node.name | endswith("-" + $pr))] | first // null')

            if [ "$ENV_NODE" = "null" ] || [ -z "$ENV_NODE" ]; then
              echo "Attempt $i/90: environment not found for PR #$PR_NUMBER"
            else
              ENV_ID=$(echo "$ENV_NODE" | jq -r '.node.id // empty')
              DEPLOY_COUNT=$(echo "$ENV_NODE" | jq -r '.node.deployments.edges | length')
              ENV_STATUS=$(echo "$ENV_NODE" | jq -r '
                if (.node.deployments.edges | length) > 0
                then .node.deployments.edges[0].node.status
                else "NO_DEPLOYMENTS" end')

              if [ -n "$ENV_ID" ] && [ "$ENV_STATUS" = "SUCCESS" ]; then
                echo "Railway PR environment deployed (envId=$ENV_ID, attempt $i)"
                break
              fi

              echo "Attempt $i/90: envId=${ENV_ID:-none} status=$ENV_STATUS deployments=$DEPLOY_COUNT"
            fi

            if [ "$i" -eq 90 ]; then
              echo "::error::Timed out waiting for Railway PR environment (15 min)"
              exit 1
            fi
            sleep 10
          done

          # Step 2: Query the service domain for this environment
          HTTP_CODE=$(railway_gql \
            'query($projectId: String!, $environmentId: String!, $serviceId: String!) { domains(projectId: $projectId, environmentId: $environmentId, serviceId: $serviceId) { serviceDomains { domain } } }' \
            "{\"projectId\": \"$RAILWAY_PROJECT_ID\", \"environmentId\": \"$ENV_ID\", \"serviceId\": \"$RAILWAY_SERVICE_ID\"}")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Railway domains query returned HTTP $HTTP_CODE"
            cat /tmp/railway_response.json 2>/dev/null || true
            exit 1
          fi

          ENV_DOMAIN=$(jq -r '.data.domains.serviceDomains[0].domain // empty' /tmp/railway_response.json)

          # Step 2b: If no domain exists, create one
          if [ -z "$ENV_DOMAIN" ]; then
            echo "No service domain found, creating one..."
            HTTP_CODE=$(railway_gql \
              'mutation($input: ServiceDomainCreateInput!) { serviceDomainCreate(input: $input) { domain } }' \
              "{\"input\": {\"serviceId\": \"$RAILWAY_SERVICE_ID\", \"environmentId\": \"$ENV_ID\"}}")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::Railway domain creation returned HTTP $HTTP_CODE"
              cat /tmp/railway_response.json 2>/dev/null || true
              exit 1
            fi

            ENV_DOMAIN=$(jq -r '.data.serviceDomainCreate.domain // empty' /tmp/railway_response.json)
            if [ -z "$ENV_DOMAIN" ]; then
              echo "::error::Failed to create service domain"
              jq . /tmp/railway_response.json
              exit 1
            fi
            echo "Created service domain: $ENV_DOMAIN"
          fi

          echo "Railway PR environment ready: $ENV_DOMAIN"
          echo "domain=$ENV_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Set Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          RAILWAY_DOMAIN: ${{ steps.railway.outputs.domain }}
          BRANCH: ${{ github.head_ref }}
          DEVELOP_PUBLIC_URL: ${{ secrets.DEVELOP_PUBLIC_URL }}
        run: |
          set -euo pipefail

          set_vercel_env() {
            local key="$1"
            local value="$2"

            # Delete existing branch-scoped env var if present
            LIST_RESPONSE=$(curl -s -o /tmp/vercel_list.json -w "%{http_code}" \
              "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            if [ "$LIST_RESPONSE" != "200" ]; then
              echo "::error::Vercel list env vars returned HTTP $LIST_RESPONSE"
              cat /tmp/vercel_list.json 2>/dev/null || true
              return 1
            fi
            EXISTING_ID=$(jq -r --arg key "$key" --arg branch "$BRANCH" \
              '[.envs[] | select(.key == $key and .gitBranch == $branch)] | first | .id // empty' \
              /tmp/vercel_list.json)

            if [ -n "$EXISTING_ID" ]; then
              DEL_CODE=$(curl -s -o /tmp/vercel_del.json -w "%{http_code}" \
                -X DELETE "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING_ID?teamId=$VERCEL_TEAM_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN")
              if [ "$DEL_CODE" != "200" ]; then
                echo "::warning::Vercel delete env var returned HTTP $DEL_CODE"
                cat /tmp/vercel_del.json 2>/dev/null || true
              else
                echo "Deleted existing $key for branch $BRANCH"
              fi
            fi

            # Create new branch-scoped env var (use jq for safe JSON escaping)
            PAYLOAD=$(jq -n \
              --arg key "$key" \
              --arg value "$value" \
              --arg branch "$BRANCH" \
              '{key: $key, value: $value, type: "plain", target: ["preview"], gitBranch: $branch}')

            CREATE_CODE=$(curl -s -o /tmp/vercel_create.json -w "%{http_code}" \
              -X POST "$VERCEL_API_URL/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            if [ "$CREATE_CODE" != "200" ] && [ "$CREATE_CODE" != "201" ]; then
              echo "::error::Vercel create env var returned HTTP $CREATE_CODE"
              cat /tmp/vercel_create.json 2>/dev/null || true
              return 1
            fi
            echo "Set $key for branch $BRANCH"
          }

          set_vercel_env "VITE_API_BASE_URL" "https://$RAILWAY_DOMAIN"
          # Points to develop backend for OAuth Proxy (preview PRs are
          # typically based on develop, so the develop backend serves as proxy)
          set_vercel_env "VITE_OAUTH_PROXY_URL" "$DEVELOP_PUBLIC_URL"

      - name: Trigger Vercel redeploy
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          BRANCH: ${{ github.head_ref }}
          REPO_ID: ${{ github.event.repository.id }}
        run: |
          set -euo pipefail

          # Trigger a new deployment so VITE_* vars are embedded in the build
          PAYLOAD=$(jq -n \
            --arg project "$VERCEL_PROJECT_ID" \
            --arg ref "$BRANCH" \
            --arg repoId "$REPO_ID" \
            '{name: "airas", project: $project, gitSource: {type: "github", ref: $ref, repoId: $repoId}}')

          DEPLOY_CODE=$(curl -s -o /tmp/vercel_deploy.json -w "%{http_code}" \
            -X POST "$VERCEL_API_URL/v13/deployments?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$DEPLOY_CODE" != "200" ] && [ "$DEPLOY_CODE" != "201" ]; then
            echo "::error::Vercel deploy returned HTTP $DEPLOY_CODE"
            cat /tmp/vercel_deploy.json 2>/dev/null || true
            exit 1
          fi

          DEPLOY_URL=$(jq -r '.url // empty' /tmp/vercel_deploy.json)
          if [ -n "$DEPLOY_URL" ]; then
            echo "Vercel redeploy triggered: https://$DEPLOY_URL"
            echo "url=https://$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Vercel redeploy response did not contain a URL"
            jq . /tmp/vercel_deploy.json
          fi

      - name: Comment PR with preview URLs
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          RAILWAY_DOMAIN: ${{ steps.railway.outputs.domain }}
          VERCEL_URL: ${{ steps.vercel_deploy.outputs.url }}
        with:
          script: |
            const railwayUrl = `https://${process.env.RAILWAY_DOMAIN}`;
            const vercelUrl = process.env.VERCEL_URL || '(see Vercel bot comment)';

            const body = [
              '## Preview Environment',
              '',
              `| Service | URL |`,
              `|---------|-----|`,
              `| Backend (Railway) | ${railwayUrl} |`,
              `| Frontend (Vercel) | ${vercelUrl} |`,
              '',
              '_This comment is automatically created when the PR is opened._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Remove Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          delete_vercel_env() {
            local key="$1"
            LIST_CODE=$(curl -s -o /tmp/vercel_list.json -w "%{http_code}" \
              "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            if [ "$LIST_CODE" != "200" ]; then
              echo "::warning::Vercel list env vars returned HTTP $LIST_CODE"
              cat /tmp/vercel_list.json 2>/dev/null || true
              return 0
            fi
            EXISTING_ID=$(jq -r --arg key "$key" --arg branch "$BRANCH" \
              '[.envs[] | select(.key == $key and .gitBranch == $branch)] | first | .id // empty' \
              /tmp/vercel_list.json)

            if [ -n "$EXISTING_ID" ]; then
              DEL_CODE=$(curl -s -o /tmp/vercel_del.json -w "%{http_code}" \
                -X DELETE "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING_ID?teamId=$VERCEL_TEAM_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN")
              if [ "$DEL_CODE" != "200" ]; then
                echo "::warning::Vercel delete returned HTTP $DEL_CODE"
                cat /tmp/vercel_del.json 2>/dev/null || true
              else
                echo "Deleted $key for branch $BRANCH"
              fi
            fi
          }

          delete_vercel_env "VITE_API_BASE_URL"
          delete_vercel_env "VITE_OAUTH_PROXY_URL"

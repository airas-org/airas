name: Preview Environment

on:
  pull_request:
    types: [opened, reopened, closed]
    branches-ignore:
      - main

env:
  RAILWAY_API_URL: https://backboard.railway.app/graphql/v2
  VERCEL_API_URL: https://api.vercel.com

jobs:
  setup-preview:
    if: github.event.action == 'opened' || github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway PR environment
        id: railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          echo "Waiting for Railway PR environment (branch: $BRANCH)..."

          for i in $(seq 1 90); do
            RESPONSE=$(curl -sf -X POST "$RAILWAY_API_URL" \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "query": "query($projectId: String!) { project(id: $projectId) { environments { edges { node { id name deployments(first: 1) { edges { node { status } } } domains { serviceDomains { domain } } } } } } }",
                "variables": { "projectId": "'"$RAILWAY_PROJECT_ID"'" }
              }') || { echo "::warning::Railway API request failed (attempt $i)"; sleep 10; continue; }

            ENV_DOMAIN=$(echo "$RESPONSE" | jq -r --arg branch "$BRANCH" '
              [.data.project.environments.edges[]
              | select(.node.name == $branch)] | first
              | .node.domains.serviceDomains[0].domain // empty')

            DEPLOY_COUNT=$(echo "$RESPONSE" | jq -r --arg branch "$BRANCH" '
              [.data.project.environments.edges[]
              | select(.node.name == $branch)] | first
              | .node.deployments.edges | length')

            ENV_STATUS=$(echo "$RESPONSE" | jq -r --arg branch "$BRANCH" '
              [.data.project.environments.edges[]
              | select(.node.name == $branch)] | first
              | (if (.node.deployments.edges | length) > 0
                 then .node.deployments.edges[0].node.status
                 else "NO_DEPLOYMENTS" end)')

            if [ -n "$ENV_DOMAIN" ] && [ "$ENV_STATUS" = "SUCCESS" ]; then
              echo "Railway PR environment ready: $ENV_DOMAIN (attempt $i)"
              echo "domain=$ENV_DOMAIN" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Attempt $i/90: status=$ENV_STATUS domain=${ENV_DOMAIN:-none} deployments=$DEPLOY_COUNT"
            sleep 10
          done

          echo "::error::Timed out waiting for Railway PR environment (15 min)"
          exit 1

      - name: Set Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          RAILWAY_DOMAIN: ${{ steps.railway.outputs.domain }}
          BRANCH: ${{ github.head_ref }}
          DEVELOP_PUBLIC_URL: ${{ secrets.DEVELOP_PUBLIC_URL }}
        run: |
          set -euo pipefail

          set_vercel_env() {
            local key="$1"
            local value="$2"

            # Delete existing branch-scoped env var if present
            EXISTING_ID=$(curl -sf "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              | jq -r --arg key "$key" --arg branch "$BRANCH" \
                '[.envs[] | select(.key == $key and .gitBranch == $branch)] | first | .id // empty')

            if [ -n "$EXISTING_ID" ]; then
              curl -sf -X DELETE "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" > /dev/null
              echo "Deleted existing $key for branch $BRANCH"
            fi

            # Create new branch-scoped env var
            curl -sf -X POST "$VERCEL_API_URL/v10/projects/$VERCEL_PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "key": "'"$key"'",
                "value": "'"$value"'",
                "type": "plain",
                "target": ["preview"],
                "gitBranch": "'"$BRANCH"'"
              }' > /dev/null
            echo "Set $key for branch $BRANCH"
          }

          set_vercel_env "VITE_API_BASE_URL" "https://$RAILWAY_DOMAIN"
          # Points to develop backend for OAuth Proxy (preview PRs are
          # typically based on develop, so the develop backend serves as proxy)
          set_vercel_env "VITE_OAUTH_PROXY_URL" "$DEVELOP_PUBLIC_URL"

      - name: Trigger Vercel redeploy
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BRANCH: ${{ github.head_ref }}
          REPO_ID: ${{ github.event.repository.id }}
        run: |
          set -euo pipefail

          # Trigger a new deployment so VITE_* vars are embedded in the build
          DEPLOY_RESPONSE=$(curl -sf -X POST "$VERCEL_API_URL/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "airas",
              "project": "'"$VERCEL_PROJECT_ID"'",
              "gitSource": {
                "type": "github",
                "ref": "'"$BRANCH"'",
                "repoId": "'"$REPO_ID"'"
              },
              "target": "preview"
            }')

          DEPLOY_URL=$(echo "$DEPLOY_RESPONSE" | jq -r '.url // empty')
          if [ -n "$DEPLOY_URL" ]; then
            echo "Vercel redeploy triggered: https://$DEPLOY_URL"
            echo "url=https://$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Vercel redeploy response did not contain a URL"
            echo "$DEPLOY_RESPONSE" | jq .
          fi

      - name: Comment PR with preview URLs
        uses: actions/github-script@v7
        env:
          RAILWAY_DOMAIN: ${{ steps.railway.outputs.domain }}
          VERCEL_URL: ${{ steps.vercel_deploy.outputs.url }}
        with:
          script: |
            const railwayUrl = `https://${process.env.RAILWAY_DOMAIN}`;
            const vercelUrl = process.env.VERCEL_URL || '(see Vercel bot comment)';

            const body = [
              '## Preview Environment',
              '',
              `| Service | URL |`,
              `|---------|-----|`,
              `| Backend (Railway) | ${railwayUrl} |`,
              `| Frontend (Vercel) | ${vercelUrl} |`,
              '',
              '_This comment is automatically created when the PR is opened._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          delete_vercel_env() {
            local key="$1"
            EXISTING_ID=$(curl -sf "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              | jq -r --arg key "$key" --arg branch "$BRANCH" \
                '[.envs[] | select(.key == $key and .gitBranch == $branch)] | first | .id // empty')

            if [ -n "$EXISTING_ID" ]; then
              curl -sf -X DELETE "$VERCEL_API_URL/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" > /dev/null
              echo "Deleted $key for branch $BRANCH"
            fi
          }

          delete_vercel_env "VITE_API_BASE_URL"
          delete_vercel_env "VITE_OAUTH_PROXY_URL"

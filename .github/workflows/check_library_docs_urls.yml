name: "Check library docs URLs"
run-name: "🔗 Library docs registry link check"

on:
  schedule:
    # Weekly, Monday 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/src/airas/resources/libraries/**"
      - "backend/scripts/check_library_docs_urls.py"

jobs:
  linkcheck:
    name: Check registry URLs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check all registry URLs
        env:
          PYTHONPATH: backend/src
        run: python3 backend/scripts/check_library_docs_urls.py

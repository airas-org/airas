# Run `pre-commit install` once per clone to activate these hooks.
#
# The lint hooks invoke the Makefile targets directly so that pre-commit,
# CI, and manual runs share the exact same tool versions (backend/uv.lock,
# frontend/package-lock.json) and scope.
repos:
- repo: local
  hooks:
    - id: make-ruff
      name: make ruff
      entry: make ruff
      language: system
      files: ^backend/.*\.py$
      pass_filenames: false

    - id: make-mypy
      name: make mypy
      entry: make mypy
      language: system
      files: ^backend/.*\.py$
      pass_filenames: false

    - id: make-biome
      name: make biome
      entry: make biome
      language: system
      files: ^frontend/.*\.(js|jsx|ts|tsx|json|md)$
      pass_filenames: false

    - id: update-openapi
      name: Update OpenAPI schema and frontend client
      entry: .pre-commit-hooks/update-openapi.sh
      language: system
      files: ^backend/src/airas/dashboard/api/
      pass_filenames: false

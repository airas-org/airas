services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: airas
      POSTGRES_PASSWORD: airas
      POSTGRES_DB: airas
    volumes:
      - airas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airas -d airas"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped
  
  airas:
    build:
      context: ../
      dockerfile: ./.devcontainer/dev.Dockerfile
    env_file:
      - ../.env
    volumes:
      - ..:/workspaces/airas:cached
    environment:
      - PYTHONPATH=/workspaces/airas/backend/src
    depends_on:
      db:
        condition: service_healthy

    command: sleep infinity

volumes:
  airas_pgdata:

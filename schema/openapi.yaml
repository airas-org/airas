          anyOf:
          - type: integer
          - type: string
          title: Num Training Samples
        num_validation_samples:
          anyOf:
          - type: integer
          - type: string
          title: Num Validation Samples
        huggingface_url:
          type: string
          maxLength: 2083
          minLength: 1
          format: uri
          title: Huggingface Url
        dependent_packages:
          items:
            type: string
          type: array
          title: Dependent Packages
        code:
          type: string
          title: Code
        citation:
          type: string
          title: Citation
        task_type:
          items:
            anyOf:
            - type: string
              const: text-generation
            - type: string
              enum:
              - object-detection
              - semantic-segmentation
              - instance-segmentation
              - panoptic-segmentation
              - video-object-segmentation
              - image-classification
              - image-captioning
              - image-embeddings
              - face-detection
              - face-verification
              - face-identification
              - few-shot-classification
              - one-shot-classification
              - facial-expression-recognition
              - valence-arousal-prediction
          type: array
          title: Task Type
        language_distribution:
          anyOf:
          - type: string
          - type: 'null'
          title: Language Distribution
        image_size:
          anyOf:
          - type: string
          - type: 'null'
          title: Image Size
        sample_data:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Sample Data
      type: object
      required:
      - description
      - num_training_samples
      - num_validation_samples
      - huggingface_url
      - dependent_packages
      - code
      - citation
      - task_type
      title: DatasetConfig

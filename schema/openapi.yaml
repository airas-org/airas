components:
  schemas:
    AnalyzeExperimentLLMMapping:
      properties:
        analyze_experiment:
          $ref: '#/components/schemas/NodeLLMConfig'
          default:
            llm_name: gpt-5.4-2026-03-05
      type: object
      title: AnalyzeExperimentLLMMapping
    AnalyzeExperimentRequestBody:
      properties:
        research_hypothesis:
          $ref: '#/components/schemas/ResearchHypothesis'
        experimental_design:
          $ref: '#/components/schemas/ExperimentalDesign-Input'
        experiment_code:
          $ref: '#/components/schemas/ExperimentCode'
        experimental_results:
          $ref: '#/components/schemas/ExperimentalResults'
        llm_mapping:
          anyOf:
          - $ref: '#/components/schemas/AnalyzeExperimentLLMMapping'
          - type: 'null'
      type: object
      required:
      - research_hypothesis
      - experimental_design
      - experiment_code
      - experimental_results
      title: AnalyzeExperimentRequestBody
    AnalyzeExperimentResponseBody:
      properties:
        experimental_analysis:
          $ref: '#/components/schemas/ExperimentalAnalysis'
        execution_time:
          additionalProperties:
            items:
              type: number
            type: array
          type: object
          title: Execution Time
      type: object
      required:
      - experimental_analysis
      - execution_time
      title: AnalyzeExperimentResponseBody
    AnthropicParams:
      properties:
        provider_type:
          type: string
          const: anthropic
          title: Provider Type
          default: anthropic
      type: object
      title: AnthropicParams
    CancelInteractiveRepoAgentRequestBody:
      properties:
        github_config:
          $ref: '#/components/schemas/GitHubConfig'
      type: object
      required:
      - github_config
      title: CancelInteractiveRepoAgentRequestBody
    CancelInteractiveRepoAgentResponseBody:
      properties:
        cancelled:
          type: boolean
          title: Cancelled
        execution_time:
          additionalProperties:
            items:
              type: number
            type: array
          type: object
          title: Execution Time
      type: object
      required:
      - cancelled
      - execution_time
      title: CancelInteractiveRepoAgentResponseBody
    CodeGenerationGraphLLMMapping:
      properties:
        dispatch_code_generation:
          $ref: '#/components/schemas/DispatchCodeGenerationLLMMapping'
          default:
            dispatch_code_generation:
              llm_name: anthropic/claude-sonnet-4-5
      type: object
      title: CodeGenerationGraphLLMMapping
    CompileLatexLLMMapping:
      properties:
        compile_latex:
          $ref: '#/components/schemas/NodeLLMConfig'
          default:
            llm_name: anthropic/claude-sonnet-4-5
      type: object
      title: CompileLatexLLMMapping
    CompileLatexSubgraphRequestBody:
      properties:
        github_config:
          $ref: '#/components/schemas/GitHubConfig'
        github_actions_agent:
          type: string
          enum:
          - claude_code
          - open_code
          title: Github Actions Agent
          default: claude_code
        latex_template_name:
          type: string
          enum:
          - iclr2024
          - agents4science_2025
          - mdpi
          title: Latex Template Name
          default: mdpi
        llm_mapping:
          anyOf:
          - $ref: '#/components/schemas/CompileLatexLLMMapping'
          - type: 'null'
      type: object
      required:
      - github_config
      title: CompileLatexSubgraphRequestBody
    CompileLatexSubgraphResponseBody:
      properties:
        compile_latex_dispatched:
          type: boolean
          title: Compile Latex Dispatched
        paper_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Paper Url
        execution_time:
          additionalProperties:
            items:
              type: number
            type: array
          type: object
          title: Execution Time
      type: object
      required:
      - compile_latex_dispatched
      - paper_url
      - execution_time
      title: CompileLatexSubgraphResponseBody
    ComputeEnvironment:
      properties:
        os:
          anyOf:
          - type: string
          - type: 'null'
          title: Os
        cpu_cores:
          anyOf:
          - type: integer
          - type: 'null'
          title: Cpu Cores
        ram_gb:
          anyOf:
          - type: integer
          - type: 'null'
          title: Ram Gb
        gpu_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Gpu Type
        gpu_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Gpu Count
        gpu_memory_gb:
          anyOf:
          - type: integer
          - type: 'null'
          title: Gpu Memory Gb
        storage_type:
          anyOf:
          - type: string
            enum:
            - nvme
            - ssd
            - hdd
          - type: 'null'
          title: Storage Type
        storage_gb:
          anyOf:
          - type: integer
          - type: 'null'
          title: Storage Gb
        python_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Python Version
        cuda_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Cuda Version
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
      type: object
      title: ComputeEnvironment
